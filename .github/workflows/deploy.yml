name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test --if-present

      - name: Build app
        run: npm run build

      - name: Lint code (warnings will not fail the build)
        continue-on-error: false
        run: npm run lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL secret."
            exit 1
          fi
          curl --fail --show-error --silent \
            --max-time 30 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            -X POST "$DEPLOY_WEBHOOK_URL"
